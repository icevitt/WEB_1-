<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viatours — Header</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-image: url('582fe118e9d0fa5aa7df13e8c355749573659ddf.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    .header {
      width: 100%;
      height: 68px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .header__inner {
      max-width: 1320px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    .header__search {
      max-width: 320px;
    }

    .header__search input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
    }

    .header__search input::placeholder {
      color: rgba(255, 255, 255, 0.65);
    }

    .header__logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .header__logo-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header__logo-text {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    .header__nav {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
    }

    .header__currency {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      letter-spacing: 0.2px;
    }

    .header__signup {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .header__signup:hover {
      color: #ffffff;
    }

    .header__login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 20px;
      background: #ffffff;
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .header__login:hover {
      background: #f0f0f0;
      transform: translateY(-1px);
    }

    .header__login:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header__inner">

      <div class="header__search">
        <input type="text" placeholder="Search destinations or activities" />
      </div>

      <a href="/" class="header__logo">
        <svg class="header__logo-icon" viewBox="0 0 28 28" fill="none">
          <path d="M14 18 C10 18, 5 14, 6 9 C8 10, 11 13, 14 14 C17 13, 20 10, 22 9 C23 14, 18 18, 14 18Z" fill="white"/>
          <circle cx="14" cy="7" r="2.2" fill="white"/>
        </svg>
        <span class="header__logo-text">viatours</span>
      </a>

      <nav class="header__nav">
        <span class="header__currency">USD</span>
        <a href="/signup" class="header__signup">Sign up</a>
        <a href="/login" class="header__login">Log in</a>
      </nav>

    </div>
  </header>

</body>
</html>
